services:
  - type: web
    name: starlight-ai-crm-mailer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Required for Chrome/Selenium if scraping needs it
      # - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
      #   value: true
    # If you want to persist the ChromaDB knowledge base across restarts,
    # you would need a paid plan to attach a disk:
    # disk:
    #   name: chromadb-data
    #   mountPath: /opt/render/project/src/chroma_db
    #   sizeGB: 1
